{% extends 'base.html' %}
{% block content %}
<h2>Edit Transaction</h2>
<form method="POST" action="{{ url_for('edit_transaction', txn_id=transaction.id) }}">
  <label for="date">Date</label>
  <input type="date" id="date" name="date" value="{{ (prev.date if prev else transaction.date).strftime('%Y-%m-%d') }}" required />

  <label for="amount">Amount (HK$)</label>
  <input type="number" id="amount" name="amount" step="0.01" value="{{ prev.amount if prev else transaction.amount }}" required />

  <label for="category">Category</label>
  <select id="category" name="category" required>
    <option value="">Select category</option>
    {% for c in categories %}
      <option value="{{ c }}" {% if (prev and prev.category==c) or (not prev and transaction.category==c) %}selected{% endif %}>{{ c }}</option>
    {% endfor %}
  </select>

  <label for="description">Description</label>
  <input type="text" id="description" name="description" value="{{ prev.description if prev else transaction.description }}" required />

  <label for="notes">Notes (optional)</label>
  <textarea id="notes" name="notes">{{ prev.notes if prev else transaction.notes }}</textarea>

  <button type="submit">Update</button>
</form>
{% endblock %}
