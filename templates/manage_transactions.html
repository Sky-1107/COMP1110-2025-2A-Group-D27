{% extends 'base.html' %}
{% block content %}
<h2>All Transactions</h2>
<form method="GET" action="{{ url_for('manage_transactions') }}" class="filter-form">
  <label for="start_date">Start date</label>
  <input type="date" id="start_date" name="start_date" value="{{ filters.start_date }}" />

  <label for="end_date">End date</label>
  <input type="date" id="end_date" name="end_date" value="{{ filters.end_date }}" />

  <label for="category">Category</label>
  <select id="category" name="category">
    <option value="">All</option>
    {% for c in categories %}
    <option value="{{ c }}" {% if filters.category == c %}selected{% endif %}>{{ c }}</option>
    {% endfor %}
  </select>

  <button type="submit">Filter</button>
</form>

<table>
  <tr><th>Date</th><th>Amount</th><th>Category</th><th>Description</th><th>Notes</th><th>Actions</th></tr>
  {% for tx in transactions %}
  <tr>
    <td>{{ tx.date }}</td>
    <td>HK$ {{ '%.2f'|format(tx.amount) }}</td>
    <td>{{ tx.category }}</td>
    <td>{{ tx.description }}</td>
    <td>{{ tx.notes }}</td>
    <td>
      <a href="{{ url_for('edit_transaction_form', txn_id=tx.id) }}">Edit</a> |
      <a href="{{ url_for('delete_transaction', txn_id=tx.id) }}" onclick="return confirm('Are you sure?')">Delete</a>
    </td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
